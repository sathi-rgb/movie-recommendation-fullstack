<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | Movie Mania</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Lexend', sans-serif;
}

body{
    height:100vh;
    background-color: #2c5364;
    position:relative;
    color:white;
}

body::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
}

/* Navbar */
.navbar{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 60px;
    z-index:2;
}

.logo{
    font-size:2rem;
    font-weight:900;
    color:white;
    letter-spacing:2px;
}

.signin-btn{
    background:#e50914;
    border:none;
    padding:8px 18px;
    border-radius:4px;
    color:white;
    font-weight:600;
    cursor:pointer;
}

/* Language Dropdown */
.language-select{
    padding:6px;
    background:black;
    color:white;
    border:1px solid #555;
    margin-right:15px;
}

.hero{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:3.5rem;
    font-weight:900;
    max-width:800px;
    line-height:1.2;
}

.hero h3{
    margin-top:20px;
    font-weight:400;
}

.hero p{
    margin:25px 0;
    font-weight:300;
}

.email-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

.email-box input{
    padding:15px;
    width:350px;
    max-width:90%;
    border:none;
    outline:none;
    background:rgba(0,0,0,0.6);
    border:1px solid #555;
    color:white;
    font-size:1rem;
}

.email-box button{
    padding:15px 25px;
    background:#e50914;
    border:none;
    color:white;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.email-box button:hover{
    background:#f40612;
}

@media(max-width:768px){
    .hero h1{
        font-size:2.2rem;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">MOVIE MANIA</div>

    <div>
        <select class="language-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
        </select>

        <button class="signin-btn" id="signinText">Sign In</button>
    </div>
</div>

<div class="hero">
    <h1 id="mainTitle">Unlimited Movie's Honest Reviews.</h1>
    <h3 id="subTitle">Discover, rate, and review your favorite movies anytime.</h3>
    <p id="description">Ready to rate? Enter your email to continue.</p>

    <div class="email-box">
        <input type="email" id="emailInput" placeholder="Email address">
        <button onclick="enterApp()" id="getStartedBtn">Get Started ></button>
    </div>
</div>

<script>
function enterApp(){
    window.location.href = "index.html";
}

function changeLanguage(lang){

    const translations = {
        en: {
            title: "Unlimited Movie's Honest Reviews.",
            subtitle: "Discover, rate, and review your favorite movies anytime.",
            description: "Ready to rate? Enter your email to continue.",
            signin: "Sign In",
            getStarted: "Get Started >",
            placeholder: "Email address"
        },
        hi: {
            title: "अनलिमिटेड फिल्मों की ईमानदार समीक्षा।",
            subtitle: "अपनी पसंदीदा फिल्मों को खोजें, रेट करें और कभी भी समीक्षा करें।",
            description: "रेट करने के लिए तैयार हैं? आगे बढ़ने के लिए अपना ईमेल दर्ज करें।",
            signin: "साइन इन",
            getStarted: "शुरू करें >",
            placeholder: "ईमेल पता"
        }
    };

    document.getElementById("mainTitle").innerText = translations[lang].title;
    document.getElementById("subTitle").innerText = translations[lang].subtitle;
    document.getElementById("description").innerText = translations[lang].description;
    document.getElementById("signinText").innerText = translations[lang].signin;
    document.getElementById("getStartedBtn").innerText = translations[lang].getStarted;
    document.getElementById("emailInput").placeholder = translations[lang].placeholder;
}
</script>

</body>
</html>
